<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d0f; color: #e8e8e8; padding: 20px; max-width: 760px; margin: 0 auto; padding-bottom: 60px; }
  header { text-align: center; margin-bottom: 16px; }
  h1 { font-size: 1.3rem; font-weight: 800; color: #fff; }
  .subtitle { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .intro { background: #11160f; border-left: 4px solid #2a9a5a; padding: 12px 15px; border-radius: 0 8px 8px 0; font-size: 0.8rem; line-height: 1.5; color: #bbb; margin-bottom: 16px; }
  .intro a { color: #6ad08a; text-decoration: none; font-weight: 700; }
  .summary-bar { display: flex; align-items: center; gap: 12px; background: #131318; border: 1px solid #1e1e26; border-radius: 10px; padding: 12px 15px; margin-bottom: 16px; }
  .summary-bar .big { font-size: 1.1rem; font-weight: 800; color: #fff; }
  .summary-bar .lbl { font-size: 0.7rem; color: #777; text-transform: uppercase; letter-spacing: 0.06em; }
  .summary-bar .track { flex: 1; height: 8px; background: #1e1e26; border-radius: 4px; overflow: hidden; }
  .summary-bar .fill { height: 100%; background: linear-gradient(to right,#1a7a5a,#2a9a5a); width: 0%; transition: width 0.3s; }
  .reset { font-size: 0.66rem; color: #777; background: none; border: 1px solid #2a2a33; border-radius: 6px; padding: 6px 11px; cursor: pointer; font-family: inherit; }
  .day { background: #131318; border: 1px solid #1e1e26; border-radius: 12px; margin-bottom: 9px; overflow: hidden; }
  .day.done { border-color: #2a5a3a; }
  .day.today { border-color: #4a6aaa; box-shadow: 0 0 14px rgba(74,106,170,0.18); }
  .day-top { display: flex; align-items: center; gap: 13px; padding: 13px 15px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .s-high .dot { background: #e0703a; } .s-mod .dot { background: #4a8ad0; } .s-low .dot { background: #4a9a5a; }
  .day-meta { flex: 1; min-width: 0; }
  .day-name { font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #777; }
  .day-name .today-pill { background: #2a4a7a; color: #bcd; font-size: 0.58rem; padding: 1px 6px; border-radius: 7px; margin-left: 6px; }
  .day-type { font-size: 0.98rem; font-weight: 700; color: #eee; margin-top: 1px; }
  .check { width: 25px; height: 25px; border: 2px solid #333; border-radius: 50%; flex-shrink: 0; position: relative; cursor: pointer; transition: transform 0.08s; }
  .check:active { transform: scale(0.86); }
  .day.done .check { background: #2a6a4a; border-color: #2a6a4a; }
  .day.done .check::after { content: ''; position: absolute; left: 8px; top: 3px; width: 5px; height: 11px; border: solid #fff; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
  .picks { padding: 0 15px 13px 37px; }
  .pick-line { font-size: 0.82rem; color: #cfd6dd; padding: 3px 0; line-height: 1.4; }
  .pick-line.empty { color: #5a5a66; font-style: italic; }
  .pick-line.wod-pick b { color: #eafff0; }
  .pl-fmt { font-size: 0.56rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: #8ce0a8; background: #14301e; padding: 2px 6px; border-radius: 8px; }
  .pl-wod { margin-top: 3px; color: #aab4bd; font-size: 0.78rem; }
  .pl-wod .wb-head { font-weight: 700; color: #ccd; margin-bottom: 2px; }
  .pl-wod .wb-list { margin: 0; padding-left: 16px; }
  .pl-wod .wb-list li { margin: 1px 0; line-height: 1.35; }
  .fast-ov { background: #1f1a0e; border: 1px solid #6a5a2a; border-radius: 12px; padding: 15px 17px; }
  .fo-h { font-size: 0.96rem; font-weight: 800; color: #f0d890; margin-bottom: 6px; }
  .fo-p { font-size: 0.82rem; color: #cbbf9f; line-height: 1.55; margin: 6px 0; }
  .fo-p b { color: #f0d890; }
  .fo-toggle { margin-top: 10px; background: #2a2418; border: 1px solid #5a4a28; color: #e0c878; border-radius: 8px; padding: 8px 13px; font-size: 0.76rem; font-weight: 700; cursor: pointer; font-family: inherit; }
  footer { margin-top: 26px; padding-top: 14px; border-top: 1px solid #1e1e26; font-size: 0.68rem; color: #555; text-align: center; line-height: 1.6; }
  footer a { color: #6ad08a; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>Weekly Schedule</h1>
  <p class="subtitle">Your week at a glance · pulled from the Train builder</p>
</header>

<div class="intro">
  Mirrors what you set in <strong>Train</strong> — each day's type and your picks. Tap a day's circle to mark it done. To change a day or its workout, open the <a href="workout.html">builder →</a>.
</div>

<div class="summary-bar">
  <div><span class="big" id="done-count">0/7</span><div class="lbl">days done</div></div>
  <div class="track"><div class="fill" id="fill"></div></div>
  <button class="reset" id="reset">Reset week</button>
</div>

<div id="week"></div>

<footer>Open the <a href="workout.html">Train builder</a> to set day types &amp; pick workouts</footer>

<script src="wods-data.js"></script>
<script>
(function() {
  var DONE = 'workout-week-done';
  var LAYOUT = 'week-layout';
  var PICKS = 'workout-picks-v2';
  var WMAP = {}; (window.WODS || []).forEach(function(w){ WMAP[w[0].toLowerCase()] = w; });
  var schedShowNormal = false;
  function fastActive(){ try { var s = parseInt(localStorage.getItem('fast-start-time'),10); if(!s) return false; var h=(Date.now()-s)/3600000; return h>=0 && h<80; } catch(e){ return false; } }
  function fastCardHTML(){
    return '<div class="fast-ov"><div class="fo-h">🟡 Fast in progress — fasted-training mode</div>' +
      '<p class="fo-p">Your normal week is paused while you fast. <b>No WOD, heavy lifting, or hard metcon.</b> Approved: easy walk (Zone 1–2), mobility/stretch, light bodyweight greasing-the-groove, or easy Zone-2 bike/row. Electrolytes before &amp; during; resume hard training the day after you break.</p>' +
      '<button class="fo-toggle" id="sched-shownormal">View my normal week anyway →</button></div>';
  }

  var DAYS = [['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
  var DEFAULT_LAYOUT = { mon:'bodyweight', tue:'lower', wed:'run', thu:'upper', fri:'wod', sat:'longrun', sun:'rest' };
  var TITLE = { bodyweight:'Bodyweight', lower:'Lower — Squat', upper:'Upper Body', push:'Push', pull:'Pull', legs:'Legs', hinge:'Hinge — Deadlift', fullbody:'Full Body', wod:'WOD', conditioning:'Conditioning', run:'Medium Run — 2–3 mi', longrun:'Long Run', rest:'Rest / Mobility' };
  var STRESS = { bodyweight:'s-mod', lower:'s-high', upper:'s-mod', push:'s-mod', pull:'s-mod', legs:'s-high', hinge:'s-high', fullbody:'s-mod', wod:'s-high', conditioning:'s-mod', run:'s-mod', longrun:'s-mod', rest:'s-low' };
  var NOTE = { run:'Conversational pace, Zone 3.', longrun:'Build 3 → 6 mi, Zone 2–3.', conditioning:'Intervals or Zone-2 cardio.', rest:'Walk + mobility. No lifting.' };

  function getJSON(k, d){ try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e){ return d; } }
  function setJSON(k, v){ localStorage.setItem(k, JSON.stringify(v)); }
  var jsToIdx = { 0:'sun',1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat' };
  var todayKey = jsToIdx[new Date().getDay()];

  function render() {
    var done = getJSON(DONE, {});
    var layout = Object.assign({}, DEFAULT_LAYOUT, getJSON(LAYOUT, {}));
    var picks = getJSON(PICKS, {});
    var weekEl = document.getElementById('week');
    var summaryBar = document.querySelector('.summary-bar');

    // Fast-override: if a fast is running, replace the week with fasted-approved guidance
    if (fastActive() && !schedShowNormal) {
      if (summaryBar) summaryBar.style.display = 'none';
      weekEl.innerHTML = fastCardHTML();
      var sn = document.getElementById('sched-shownormal');
      if (sn) sn.onclick = function(){ schedShowNormal = true; render(); };
      return;
    }
    if (summaryBar) summaryBar.style.display = '';

    var html = '', doneN = 0;

    DAYS.forEach(function(d) {
      var day = d[0], name = d[1];
      var type = layout[day], title = TITLE[type] || type, stress = STRESS[type] || 's-mod';
      var isDone = !!done[day]; if (isDone) doneN++;
      var isToday = day === todayKey;
      html += '<div class="day ' + stress + (isDone ? ' done' : '') + (isToday ? ' today' : '')+'" data-day="'+day+'">';
      html += '<div class="day-top"><div class="dot"></div><div class="day-meta">' +
        '<div class="day-name">' + name + (isToday ? '<span class="today-pill">today</span>' : '') + '</div>' +
        '<div class="day-type">' + title + '</div></div>' +
        '<div class="check" data-check="' + day + '"></div></div>';
      html += '<div class="picks">';
      var dayPicks = [];
      Object.keys(picks).filter(function(k){ return k.indexOf(day + ':') === 0; }).forEach(function(k){
        var v = picks[k];
        if (Array.isArray(v)) dayPicks = dayPicks.concat(v);
        else if (v) dayPicks.push(v);
      });
      if (dayPicks.length) {
        dayPicks.forEach(function(v){
          var w = WMAP[('' + v).toLowerCase()];
          if (w) {   // it's a WOD — list its movements, not just the name
            html += '<div class="pick-line wod-pick"><b>• ' + v + '</b> <span class="pl-fmt">' + w[1] + '</span>' +
              (window.wodBullets ? '<div class="pl-wod">' + window.wodBullets(w[3]) + '</div>' : '') + '</div>';
          } else {
            html += '<div class="pick-line">• ' + v + '</div>';
          }
        });
      } else if (NOTE[type]) {
        html += '<div class="pick-line">' + NOTE[type] + '</div>';
      } else {
        html += '<div class="pick-line empty">— open Train to pick —</div>';
      }
      html += '</div></div>';
    });

    weekEl.innerHTML = html;
    document.getElementById('done-count').textContent = doneN + '/7';
    document.getElementById('fill').style.width = (doneN/7*100) + '%';

    weekEl.querySelectorAll('.check').forEach(function(box) {
      box.onclick = function() {
        var d = getJSON(DONE, {});
        var day = box.dataset.check;
        if (d[day]) delete d[day]; else d[day] = 1;
        setJSON(DONE, d); render();
      };
    });
  }

  document.getElementById('reset').onclick = function() {
    if (confirm('Reset all day checkmarks? (Your layout & picks stay saved.)')) { setJSON(DONE, {}); render(); }
  };
  render();
})();
</script>
</body>
</html>
