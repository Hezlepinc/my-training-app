<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keto Food Catalog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d0f; color: #e8e8e8; padding: 20px; max-width: 720px; margin: 0 auto; padding-bottom: 50px; }
  a.back { font-size: 0.75rem; color: #6ad08a; text-decoration: none; }
  header { text-align: center; margin: 8px 0 14px; }
  h1 { font-size: 1.3rem; font-weight: 800; color: #fff; }
  .subtitle { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .search { position: sticky; top: 0; background: #0d0d0f; padding: 8px 0 10px; z-index: 10; }
  .search input { width: 100%; background: #131318; border: 1px solid #2a2a33; color: #fff; border-radius: 9px; padding: 11px 14px; font-size: 0.95rem; font-family: inherit; }
  .cat-h { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: #5a8aaa; margin: 18px 0 8px; }
  .col-head, .food { display: grid; grid-template-columns: 1fr 52px 44px 44px 52px; gap: 6px; align-items: center; }
  .col-head { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; padding: 0 10px 5px; font-weight: 700; }
  .col-head > div:not(:first-child), .food > div:not(.f-name) { text-align: right; }
  .food { background: #131318; border: 1px solid #1e1e26; border-radius: 8px; padding: 9px 10px; margin-bottom: 5px; font-size: 0.84rem; }
  .f-name { font-weight: 600; color: #ddd; }
  .f-name .serv { display: block; font-size: 0.68rem; color: #777; font-weight: 400; margin-top: 1px; }
  .f-cal { color: #ccc; font-weight: 700; }
  .f-fat { color: #e0b040; } .f-pro { color: #5ad080; } .f-carb { color: #9a9ac8; font-weight: 700; }
  .empty { text-align: center; color: #666; padding: 30px; font-size: 0.85rem; }
  footer { margin-top: 24px; padding-top: 14px; border-top: 1px solid #1e1e26; font-size: 0.66rem; color: #555; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<a class="back" href="tools.html">← Tools</a>
<header>
  <h1>Keto Food Catalog</h1>
  <p class="subtitle">Per serving · cal / fat / protein / net carbs · search to filter</p>
</header>

<div class="search"><input id="q" type="search" placeholder="Search foods… (e.g. salmon, cheese, avocado)" autocomplete="off"></div>
<div id="list"></div>

<footer>Approximate values, rounded. Brands vary — check labels for exact macros.</footer>

<script>
(function() {
  // [name, category, serving, cal, fat, protein, netCarb]
  var FOODS = [
    ["Ribeye steak","Proteins","6 oz",480,38,36,0],
    ["NY strip steak","Proteins","6 oz",380,18,52,0],
    ["Sirloin steak","Proteins","6 oz",330,14,48,0],
    ["Ground beef 80/20","Proteins","6 oz",430,34,28,0],
    ["Chicken thigh (skin on)","Proteins","6 oz",380,28,30,0],
    ["Chicken breast","Proteins","6 oz",280,6,52,0],
    ["Pork chop","Proteins","6 oz",360,20,42,0],
    ["Ground pork","Proteins","6 oz",460,37,30,0],
    ["Sausage links","Proteins","2 links",200,18,10,1],
    ["Bacon","Proteins","3 slices",160,12,12,0],
    ["Eggs","Proteins","2 large",140,10,12,1],
    ["Salmon (wild)","Proteins","6 oz",350,20,40,0],
    ["Shrimp","Proteins","6 oz",170,2,36,1],
    ["Tuna (canned)","Proteins","1 can",110,1,25,0],
    ["Sardines (in oil)","Proteins","1 tin",190,11,22,0],
    ["Venison","Proteins","6 oz",270,5,52,0],

    ["Butter","Dairy & Fats","1 tbsp",100,11,0,0],
    ["Avocado oil","Dairy & Fats","1 tbsp",120,14,0,0],
    ["Olive oil","Dairy & Fats","1 tbsp",120,14,0,0],
    ["Cheddar cheese","Dairy & Fats","1 oz",110,9,7,1],
    ["Mozzarella","Dairy & Fats","1 oz",85,6,6,1],
    ["Parmesan","Dairy & Fats","1 tbsp",22,1.5,2,0],
    ["Cream cheese","Dairy & Fats","2 tbsp",100,10,2,1],
    ["Heavy cream","Dairy & Fats","2 tbsp",100,11,1,1],
    ["Sour cream","Dairy & Fats","2 tbsp",60,6,1,1],
    ["Greek yogurt (full fat)","Dairy & Fats","1/2 cup",110,8,8,4],

    ["Avocado","Veg","1/2",120,11,1,1],
    ["Spinach","Veg","1 cup raw",7,0,1,0],
    ["Broccoli","Veg","1 cup",30,0,2,4],
    ["Cauliflower","Veg","1 cup",25,0,2,3],
    ["Asparagus","Veg","1 cup",27,0,3,2],
    ["Brussels sprouts","Veg","1 cup",38,0,3,4],
    ["Zucchini","Veg","1 cup",20,0,1,3],
    ["Mushrooms","Veg","1 cup",15,0,2,2],
    ["Green beans","Veg","1 cup",31,0,2,4],
    ["Bell pepper","Veg","1/2",18,0,1,3],
    ["Cucumber","Veg","1 cup",16,0,1,3],

    ["Macadamia nuts","Nuts & Seeds","1 oz",200,21,2,1.5],
    ["Pecans","Nuts & Seeds","1 oz",200,20,3,1],
    ["Almonds","Nuts & Seeds","1 oz",160,14,6,3],
    ["Walnuts","Nuts & Seeds","1 oz",185,18,4,2],
    ["Chia seeds","Nuts & Seeds","1 tbsp",60,4,2,1],
    ["Almond butter","Nuts & Seeds","2 tbsp",196,18,7,3],
    ["Almond flour","Nuts & Seeds","1/4 cup",160,14,6,3],

    ["Avocado mayo","Condiments","1 tbsp",100,11,0,0],
    ["Mustard","Condiments","1 tsp",3,0,0,0],
    ["Coconut aminos","Condiments","1 tbsp",5,0,0,1],
    ["Marinara (no sugar)","Condiments","1/4 cup",30,1,1,4],
    ["Hot sauce","Condiments","1 tsp",0,0,0,0],

    ["Raspberries","Fruit (small)","1/2 cup",32,0,1,3],
    ["Blackberries","Fruit (small)","1/2 cup",31,0,1,3],
    ["Strawberries","Fruit (small)","1/2 cup",25,0,1,4],
    ["Blueberries","Fruit (small)","1/4 cup",21,0,0,5],

    ["Black coffee","Other","1 cup",2,0,0,0],
    ["Bone broth","Other","1 cup",45,1,9,1],
    ["Pork rinds","Other","1 oz",150,9,17,0],
    ["Dark chocolate 85%","Other","1 oz",170,14,3,5]
  ];

  var listEl = document.getElementById('list');
  var qEl = document.getElementById('q');

  function render(filter) {
    filter = (filter || '').toLowerCase().trim();
    var byCat = {};
    var order = [];
    FOODS.forEach(function(f) {
      if (filter && f[0].toLowerCase().indexOf(filter) === -1) return;
      if (!byCat[f[1]]) { byCat[f[1]] = []; order.push(f[1]); }
      byCat[f[1]].push(f);
    });
    if (!order.length) { listEl.innerHTML = '<div class="empty">No foods match "' + filter + '".</div>'; return; }
    var html = '';
    order.forEach(function(cat) {
      html += '<div class="cat-h">' + cat + '</div>';
      html += '<div class="col-head"><div>Food</div><div>Cal</div><div>Fat</div><div>Pro</div><div>Net C</div></div>';
      byCat[cat].forEach(function(f) {
        html += '<div class="food"><div class="f-name">' + f[0] + '<span class="serv">' + f[2] + '</span></div>' +
          '<div class="f-cal">' + f[3] + '</div><div class="f-fat">' + f[4] + 'g</div>' +
          '<div class="f-pro">' + f[5] + 'g</div><div class="f-carb">' + f[6] + 'g</div></div>';
      });
    });
    listEl.innerHTML = html;
  }

  qEl.addEventListener('input', function(){ render(qEl.value); });
  render('');
})();
</script>
</body>
</html>
