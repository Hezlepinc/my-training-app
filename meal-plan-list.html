<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Meal Plan — Shopping List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 24px; max-width: 1000px; margin: 0 auto; padding-bottom: 50px; }
  .back { font-size: 0.75rem; color: #888; text-decoration: none; }
  header { margin: 8px 0 18px; border-bottom: 2px solid #1a1a1a; padding-bottom: 14px; }
  h1 { font-size: 1.4rem; font-weight: 800; }
  .subtitle { font-size: 0.8rem; color: #666; margin-top: 4px; }

  .from-plan { background: #f0f7f2; border-left: 4px solid #1f7a3f; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 0.82rem; line-height: 1.6; margin-bottom: 18px; }
  .from-plan strong { color: #15602f; }
  .from-plan .recipes { color: #333; }

  .empty { text-align: center; padding: 50px 20px; color: #888; }
  .empty h2 { font-size: 1rem; color: #555; margin-bottom: 10px; font-weight: 700; }
  .empty a { color: #1f7a3f; font-weight: 700; text-decoration: none; }

  .progress-bar { position: sticky; top: 0; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 11px 15px; margin-bottom: 18px; z-index: 50; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .progress-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .progress-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }
  .progress-count { font-size: 0.95rem; font-weight: 800; min-width: 60px; }
  .progress-track { flex: 1; height: 9px; background: #f0f0f0; border-radius: 5px; overflow: hidden; min-width: 110px; }
  .progress-fill { height: 100%; background: linear-gradient(to right,#1f7a3f,#2a9a5a); width: 0%; transition: width 0.3s; }
  .reset-btn { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 7px 13px; background: transparent; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; color: #888; font-family: inherit; }

  .store-header { display: flex; align-items: baseline; gap: 12px; padding: 12px 15px; color: #fff; border-radius: 6px 6px 0 0; margin-top: 22px; }
  .store-header h2 { font-size: 1rem; font-weight: 800; }
  .store-header .count { margin-left: auto; font-size: 0.78rem; font-weight: 700; opacity: 0.9; }
  .sc-costco { background: #c0392b; } .sc-publix { background: #1f7a3f; } .sc-amazon { background: #c8a040; }

  .items { border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; cursor: pointer; user-select: none; transition: opacity 0.15s, background 0.1s, transform 0.08s; }
  .item:active { background: #eef4f0; transform: scale(0.995); }
  .item:last-child { border-bottom: none; }
  .item:nth-child(even) { background: #fafafa; }
  .item.checked { opacity: 0.4; }
  .item.checked .it-name, .item.checked .it-qty { text-decoration: line-through; }
  .checkbox { width: 18px; height: 18px; border: 2px solid #bbb; border-radius: 4px; flex-shrink: 0; margin-top: 1px; position: relative; }
  .item.checked .checkbox { background: #1f7a3f; border-color: #1f7a3f; }
  .item.checked .checkbox::after { content: ''; position: absolute; left: 5px; top: 1px; width: 5px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .it-body { flex: 1; }
  .it-qty { font-weight: 800; color: #1a1a1a; }
  .it-name { font-weight: 500; }
  .it-from { font-size: 0.68rem; color: #999; display: block; margin-top: 1px; }

  .staples { margin-top: 26px; }
  .staples-head { background: #555; color: #fff; padding: 10px 15px; border-radius: 6px 6px 0 0; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .staples-head .chev { transition: transform 0.2s; font-size: 0.7rem; }
  .staples.open .staples-head .chev { transform: rotate(90deg); }
  .staples-body { display: none; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; padding: 6px 0; }
  .staples.open .staples-body { display: block; }
  .staple-item { padding: 6px 15px; font-size: 0.8rem; color: #777; }

  footer { margin-top: 30px; padding-top: 14px; border-top: 1px solid #ddd; font-size: 0.72rem; color: #888; text-align: center; }
  footer a { color: #555; text-decoration: none; }
</style>
</head>
<body>

<a class="back" href="index.html">← Cookbook</a>
<header>
  <h1>My Meal Plan — Shopping List</h1>
  <p class="subtitle">Auto-built from the recipes you picked this week · tap to check off</p>
</header>

<div id="content"></div>

<footer>
  Generated from your weekly picks &nbsp;|&nbsp; <a href="index.html">Edit picks in Cookbook</a> &nbsp;|&nbsp; <a href="shopping-list-by-store.html">Full master list</a>
</footer>

<script src="recipes-data.js"></script>
<script>
(function() {
  var COUNTS_KEY = 'meal-plan-counts';
  var TARGET_KEY = 'meal-target';
  var CHECK_KEY = 'meal-plan-checks';
  var content = document.getElementById('content');

  function getCounts() { try { return JSON.parse(localStorage.getItem(COUNTS_KEY) || '{}'); } catch(e) { return {}; } }
  function getTarget() { var t = parseInt(localStorage.getItem(TARGET_KEY) || '21', 10); return (t > 0) ? t : 21; }
  function getChecks() { try { return JSON.parse(localStorage.getItem(CHECK_KEY) || '{}'); } catch(e) { return {}; } }
  function setChecks(s) { localStorage.setItem(CHECK_KEY, JSON.stringify(s)); }

  var FRAC = { 0.25:'¼', 0.33:'⅓', 0.5:'½', 0.66:'⅔', 0.75:'¾' };
  function fmtQty(qty, unit) {
    if (qty == null) return unit || '';
    var whole = Math.floor(qty);
    var freq = Math.round((qty - whole) * 100) / 100;
    var fr = FRAC[freq];
    var num;
    if (fr) num = (whole ? whole : '') + fr;
    else num = (Math.round(qty * 100) / 100).toString();
    return (num + ' ' + (unit || '')).trim();
  }

  var STORE_INFO = {
    costco: { label: 'Costco', cls: 'sc-costco' },
    publix: { label: 'Publix', cls: 'sc-publix' },
    amazon: { label: 'Amazon', cls: 'sc-amazon' }
  };

  function render() {
    var counts = getCounts();
    var week = Object.keys(counts).filter(function(id){ return window.RECIPES && window.RECIPES[id] && counts[id] > 0; });
    if (!week.length) {
      content.innerHTML = '<div class="empty"><h2>No meals planned yet</h2>' +
        'Go to the <a href="index.html">Cookbook</a> and use the <strong>+</strong> stepper to add meals. ' +
        'Come back here and your shopping list builds itself.</div>';
      return;
    }

    // Aggregate — each recipe scaled by how many times you'll make it (its count)
    var buy = { costco: {}, publix: {}, amazon: {} };   // key item|unit -> {item,unit,qty,store,from:[]}
    var staples = {};                                    // item -> true
    var recipeNames = [];

    week.forEach(function(id) {
      var r = window.RECIPES[id];
      var n = counts[id];
      recipeNames.push(r.name + (n > 1 ? ' ×' + n : ''));
      r.ingredients.forEach(function(ing) {
        if (ing.staple) { staples[ing.item] = true; return; }
        var store = ing.store || 'publix';
        var key = ing.item + '|' + (ing.unit || '');
        var add = (ing.qty != null) ? ing.qty * n : null;   // scale by count
        if (!buy[store][key]) {
          buy[store][key] = { item: ing.item, unit: ing.unit || '', qty: add, store: store, from: [r.name] };
        } else {
          var e = buy[store][key];
          if (e.qty != null && add != null) e.qty += add;
          if (e.from.indexOf(r.name) === -1) e.from.push(r.name);
        }
      });
    });

    var costs = window.RECIPE_COST || {};
    var totalCost = week.reduce(function(s, id){ return s + (costs[id] || 0) * counts[id]; }, 0);
    var totalMeals = week.reduce(function(s, id){ return s + ((window.NOT_MEAL && window.NOT_MEAL[id]) ? 0 : counts[id]); }, 0);
    var target = getTarget();

    var html = '';
    html += '<div class="from-plan"><strong>This week:</strong> <span class="recipes">' +
      recipeNames.join(' · ') + '</span>' +
      '<div style="margin-top:9px;font-weight:800;font-size:1rem;color:' + (totalMeals >= target ? '#15602f' : '#8a6a20') + ';">' +
      totalMeals + ' / ' + target + ' meals planned &nbsp;·&nbsp; Est. groceries ~$' + totalCost + '</div>' +
      '<div style="font-size:0.72rem;color:#888;margin-top:3px;line-height:1.4;">Cost &amp; ingredient amounts scale with how many times you make each recipe. Upper-bound — shared staples (cheese, oil, eggs) bought once but counted per recipe, so real spend is usually a bit lower.</div></div>';

    // progress bar
    html += '<div class="progress-bar"><div class="progress-row">' +
      '<span class="progress-label">Got it</span>' +
      '<span class="progress-count" id="pc">0 / 0</span>' +
      '<div class="progress-track"><div class="progress-fill" id="pf"></div></div>' +
      '<button class="reset-btn" id="reset-checks">Reset</button>' +
      '</div></div>';

    ['costco','publix','amazon'].forEach(function(store) {
      var entries = Object.keys(buy[store]).map(function(k){ return buy[store][k]; });
      if (!entries.length) return;
      entries.sort(function(a,b){ return a.item.localeCompare(b.item); });
      var si = STORE_INFO[store];
      html += '<div class="store-header '+si.cls+'"><h2>'+si.label+'</h2>' +
        '<span class="count" data-store-count="'+store+'"></span></div>';
      html += '<div class="items">';
      entries.forEach(function(e) {
        var qtyTxt = fmtQty(e.qty, e.unit);
        var fromTxt = e.from.length > 1 ? e.from.length + ' recipes' : e.from[0];
        var ckey = store + '::' + e.item + '::' + e.unit;
        html += '<div class="item" data-key="'+encodeURIComponent(ckey)+'">' +
          '<div class="checkbox"></div>' +
          '<div class="it-body"><span class="it-qty">'+qtyTxt+'</span> <span class="it-name">'+e.item+'</span>' +
          '<span class="it-from">'+fromTxt+'</span></div></div>';
      });
      html += '</div>';
    });

    // staples
    var stapleItems = Object.keys(staples).sort();
    if (stapleItems.length) {
      html += '<div class="staples" id="staples"><div class="staples-head" id="staples-head">' +
        '<span class="chev">▶</span> You likely already have ('+stapleItems.length+')</div>' +
        '<div class="staples-body">';
      stapleItems.forEach(function(it){ html += '<div class="staple-item">• '+it+'</div>'; });
      html += '</div></div>';
    }

    content.innerHTML = html;
    wireChecks();
  }

  function wireChecks() {
    var checks = getChecks();
    var items = Array.from(document.querySelectorAll('.item'));
    items.forEach(function(item) {
      var key = item.dataset.key;
      if (checks[key]) item.classList.add('checked');
      item.addEventListener('click', function() {
        var on = item.classList.toggle('checked');
        var s = getChecks();
        if (on) s[key] = 1; else delete s[key];
        setChecks(s);
        updateProgress();
      });
    });
    var rb = document.getElementById('reset-checks');
    if (rb) rb.addEventListener('click', function() {
      localStorage.removeItem(CHECK_KEY);
      document.querySelectorAll('.item').forEach(function(i){ i.classList.remove('checked'); });
      updateProgress();
    });
    var sh = document.getElementById('staples-head');
    if (sh) sh.addEventListener('click', function(){ document.getElementById('staples').classList.toggle('open'); });
    updateProgress();
  }

  function updateProgress() {
    var items = Array.from(document.querySelectorAll('.item'));
    var done = items.filter(function(i){ return i.classList.contains('checked'); }).length;
    var pc = document.getElementById('pc'); var pf = document.getElementById('pf');
    if (pc) pc.textContent = done + ' / ' + items.length;
    if (pf) pf.style.width = (items.length ? (done/items.length*100) : 0).toFixed(1) + '%';
    ['costco','publix','amazon'].forEach(function(store) {
      var cEl = document.querySelector('[data-store-count="'+store+'"]');
      if (!cEl) return;
      var sItems = items.filter(function(i){ return decodeURIComponent(i.dataset.key).indexOf(store+'::')===0; });
      var sDone = sItems.filter(function(i){ return i.classList.contains('checked'); }).length;
      cEl.textContent = sDone + ' / ' + sItems.length;
    });
  }

  render();
})();
</script>

</body>
</html>
