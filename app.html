<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MyTrainingApp</title>
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTrainingApp">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0d0d0f; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

  /* Top header */
  .app-header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    padding-top: calc(10px + env(safe-area-inset-top));
    background: #0d0d0f; border-bottom: 1px solid #1c1c22;
  }
  .app-logo { width: 24px; height: 24px; flex-shrink: 0; }
  .app-title { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: 0.01em; }
  .app-section { margin-left: auto; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #5a5a66; }

  /* Iframe fills the middle */
  .app-frame { flex: 1 1 auto; width: 100%; border: 0; background: #fff; }

  /* Bottom tab bar */
  .tab-bar {
    flex: 0 0 auto;
    display: flex;
    background: #111116; border-top: 1px solid #1c1c22;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 9px 0 8px; min-height: 52px; cursor: pointer; border: none; background: none;
    color: #5a5a66; font-family: inherit; font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s, transform 0.08s;
  }
  .tab svg { width: 22px; height: 22px; display: block; }
  .tab.active { color: #2a9a5a; }
  .tab:active { transform: scale(0.88); opacity: 0.7; }

  /* Loading shimmer */
  .loader { position: absolute; left: 0; right: 0; top: 45px; bottom: 56px; display: flex; align-items: center; justify-content: center; background: #fff; color: #aaa; font-size: 0.8rem; z-index: 2; }
  .loader.hide { display: none; }
</style>
</head>
<body>

<div class="app-header">
  <svg class="app-logo" viewBox="0 0 24 24" fill="#2a9a5a" aria-hidden="true">
    <path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C3 11 4 9 17 8z"/>
  </svg>
  <span class="app-title">MyTrainingApp</span>
</div>

<div class="loader" id="loader">Loading…</div>
<iframe class="app-frame" id="frame" title="content"></iframe>

<nav class="tab-bar">
  <button class="tab active" data-tab="cook" data-src="index.html" data-name="Cookbook">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Cook
  </button>
  <button class="tab" data-tab="shop" data-src="meal-plan-list.html" data-name="Shopping List">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Shop
  </button>
  <button class="tab" data-tab="fast" data-src="fast-tracker.html" data-name="Fast Tracker">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
    Fast
  </button>
  <button class="tab" data-tab="train" data-src="workout.html" data-name="Training">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>
    Train
  </button>
  <button class="tab" data-tab="sched" data-src="schedule.html" data-name="Weekly Schedule">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Week
  </button>
  <button class="tab" data-tab="tools" data-src="tools.html" data-name="Tools">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2" fill="#0d0d0f"/><circle cx="15" cy="12" r="2" fill="#0d0d0f"/><circle cx="8" cy="18" r="2" fill="#0d0d0f"/></svg>
    Tools
  </button>
</nav>

<script>
(function() {
  var TAB_KEY = 'keto-app-tab';
  var frame = document.getElementById('frame');
  var loader = document.getElementById('loader');
  var sectionName = document.getElementById('section-name');
  var tabs = Array.from(document.querySelectorAll('.tab'));
  var loaderTimer = null;

  function activate(tab, save) {
    tabs.forEach(function(t){ t.classList.toggle('active', t === tab); });
    if (sectionName) sectionName.textContent = tab.dataset.name;
    loader.classList.remove('hide');
    frame.src = tab.dataset.src;
    if (save !== false) { try { localStorage.setItem(TAB_KEY, tab.dataset.tab); } catch(e){} }
    // safety net: never let the loader overlay get stuck if 'load' doesn't fire
    if (loaderTimer) clearTimeout(loaderTimer);
    loaderTimer = setTimeout(function(){ loader.classList.add('hide'); }, 4000);
  }

  frame.addEventListener('load', function(){
    if (loaderTimer) clearTimeout(loaderTimer);
    loader.classList.add('hide');
  });

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function(){ activate(tab, true); });
  });

  // Restore last tab
  var last = null;
  try { last = localStorage.getItem(TAB_KEY); } catch(e){}
  var startTab = tabs.find(function(t){ return t.dataset.tab === last; }) || tabs[0];
  activate(startTab, false);

  // Register service worker for offline; auto-reload once when a new worker takes over
  if ('serviceWorker' in navigator) {
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        reg.update();
      }).catch(function(){});
    });
  }
})();
</script>

</body>
</html>
